$mod = SUPER
$term = foot
$browser = firefox
$editor = cursor
$fileman = thunar

# Core
bind = $mod, Space, exec, wofi --show drun
bind = $mod ALT, Space, exec, $term bash -lc 'echo "custom menu placeholder"; read -n 1 -s'
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Return, exec, $browser
bind = $mod SHIFT, C, exec, $editor
bind = $mod SHIFT, F, exec, $fileman
bind = $mod SHIFT ALT, F, exec, $term yazi
bind = $mod SHIFT, N, exec, $term nvim
bind = $mod SHIFT, D, exec, $term lazydocker
bind = $mod CTRL, T, exec, $term btop
bind = $mod CTRL, B, exec, $term bluetui
bind = $mod CTRL, W, exec, ~/.local/bin/wifi-menu
bind = $mod CTRL, L, exec, hyprlock
bind = $mod, W, killactive,
bind = CTRL ALT, Delete, exec, hyprctl clients -j | jq -r '.[].address' | while read -r a; do hyprctl dispatch closewindow address:$a; done

# Window state
bind = $mod, F, fullscreen, 0
bind = $mod ALT, F, fullscreenstate, 0 2
bind = $mod, T, togglefloating,
bind = $mod, O, togglespecialworkspace, magic
bind = $mod ALT, S, movetoworkspace, special:magic
bind = $mod, S, togglespecialworkspace, magic

# Focus and move
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, swapwindow, l
bind = $mod SHIFT, right, swapwindow, r
bind = $mod SHIFT, up, swapwindow, u
bind = $mod SHIFT, down, swapwindow, d

# Resize
binde = $mod, minus, resizeactive, -40 0
binde = $mod, equal, resizeactive, 40 0
binde = $mod SHIFT, minus, resizeactive, 0 40
binde = $mod SHIFT, equal, resizeactive, 0 -40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, Tab, workspace, +1
bind = $mod SHIFT, Tab, workspace, -1

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Media / system
bind = , Print, exec, ~/.local/bin/capture-region
bind = ALT, Print, exec, ~/.local/bin/capture-window
bind = $mod, Print, exec, ~/.local/bin/color-picker

bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioMute, exec, pamixer -t
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
