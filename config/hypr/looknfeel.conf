general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  col.active_border = rgba(7aa2f7ff)
  col.inactive_border = rgba(565f89cc)
}

decoration {
  rounding = 10

  blur {
    enabled = true
    size = 6
    passes = 2
    vibrancy = 0.15
  }

  shadow {
    enabled = true
    range = 12
    render_power = 3
  }
}

animations {
  enabled = true

  bezier = easeOut, 0.05, 0.9, 0.1, 1.0
  animation = windows, 1, 5, easeOut
  animation = windowsOut, 1, 5, easeOut, popin 80%
  animation = border, 1, 10, default
  animation = fade, 1, 5, default
  animation = workspaces, 1, 5, easeOut
}
